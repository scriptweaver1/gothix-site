<!DOCTYPE html>
<html lang="en" data-persona="both">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GothicMynx · Audio Masterlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Unbounded:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="giant-star">
        <div class="star-core"></div>
        <div class="star-corona"></div>
    </div>
    <div class="nebula-glow"></div>

    <header class="site-header">
        <div class="header-content">
            <h1 class="site-title">
                <span class="title-gothic">Gothic</span><span class="title-mynx">Mynx</span>
            </h1>
            <p class="site-subtitle">Audio Masterlist</p>
        </div>

        <div class="persona-switch" id="personaSwitch">
            <button class="switch-option" data-persona="gothix">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
                    <path d="M12 2a7 7 0 0 0 0 20"/>
                </svg>
                <span>Gothix</span>
            </button>
            <button class="switch-option active" data-persona="both">
                <span>✦</span>
            </button>
            <button class="switch-option" data-persona="minxy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                </svg>
                <span>Minxy</span>
            </button>
            <div class="switch-indicator"></div>
        </div>
    </header>

    <main class="main-content">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-heading">Categories</h3>
                <div class="category-list" id="categoryList">
                    <button class="category-btn active" data-category="all">All</button>
                    <!-- Category buttons injected dynamically from audios.json -->
                </div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-heading">Source</h3>
                <div class="category-list" id="sourceList">
                    <button class="category-btn active" data-source="all">All</button>
                    <button class="category-btn" data-source="reddit">Reddit</button>
                    <button class="category-btn" data-source="patreon">Patreon</button>
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-section">
                <h3 class="sidebar-heading">Layout</h3>

                <label class="sidebar-label">Cards Per Row</label>
                <div class="cards-per-row" id="cardsPerRow">
                    <button class="cpr-btn" data-cols="1">1</button>
                    <button class="cpr-btn active" data-cols="2">2</button>
                    <button class="cpr-btn" data-cols="3">3</button>
                </div>
            </div>
        </aside>

        <div class="content-area">
            <section class="controls">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search audios..." class="search-input">
                </div>
                <div class="sort-wrapper">
                    <select id="sortSelect" class="sort-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="title">Title A–Z</option>
                    </select>
                </div>
            </section>

            <section class="audio-grid" id="audioGrid">
                <!-- Cards injected by JS -->
            </section>

            <div class="empty-state" id="emptyState" style="display:none;">
                <p>No audios found ✦</p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="constellation-divider">
            <span>✦</span><span>·</span><span>✦</span><span>·</span><span>✦</span>
        </div>
        <p>Made with 🖤 for <strong>GothicMynx</strong></p>
    </footer>

    <button class="cinematic-toggle" id="cinematicToggle" aria-label="Cinematic mode" title="Cinematic mode">
        <svg class="icon-on" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/>
        </svg>
        <svg class="icon-off" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
    </button>

    <div class="a11y-widget" id="a11yWidget">
        <button class="a11y-toggle" id="a11yToggle" aria-label="Accessibility options">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="4.5" r="2.5"/>
                <path d="M12 7v5m0 0l-4 6m4-6l4 6"/>
                <path d="M6 10h12"/>
            </svg>
        </button>
        <div class="a11y-menu" id="a11yMenu">
            <span class="a11y-menu-label">Font Size</span>
            <div class="a11y-size-row">
                <button class="a11y-size-btn" data-size="0">12</button>
                <button class="a11y-size-btn active" data-size="1">14</button>
                <button class="a11y-size-btn" data-size="2">16</button>
                <button class="a11y-size-btn" data-size="3">18</button>
            </div>
            <div class="a11y-divider"></div>
            <span class="a11y-menu-label">Font</span>
            <button class="a11y-font-btn active" data-font="default">Default</button>
            <button class="a11y-font-btn" data-font="opendyslexic">OpenDyslexic</button>
            <button class="a11y-font-btn" data-font="arial">Arial</button>
            <button class="a11y-font-btn" data-font="atkinson">Atkinson Hyperlegible</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="ship.js"></script>
    <script src="app.js"></script>
</body>
</html>

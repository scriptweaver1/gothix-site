<!DOCTYPE html>
<html lang="en" data-persona="gothix">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GothicMynx · Audio Masterlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Unbounded:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="nebula-glow"></div>

    <header class="site-header">
        <div class="header-content">
            <h1 class="site-title">
                <span class="title-gothix">Gothix</span>
                <span class="title-separator">✦</span>
                <span class="title-minxy">Minxy</span>
            </h1>
            <p class="site-subtitle">Audio Masterlist</p>
        </div>

        <button class="persona-toggle" id="personaToggle" aria-label="Toggle persona">
            <div class="toggle-track">
                <div class="toggle-thumb">
                    <svg class="toggle-icon icon-gothix" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
                        <path d="M12 2a7 7 0 0 0 0 20"/>
                    </svg>
                    <svg class="toggle-icon icon-minxy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                    </svg>
                </div>
                <span class="toggle-label toggle-label-gothix">Gothix</span>
                <span class="toggle-label toggle-label-minxy">Minxy</span>
            </div>
        </button>
    </header>

    <main class="main-content">
        <section class="source-tabs">
            <button class="tab active" data-source="all">All</button>
            <button class="tab" data-source="reddit">Reddit</button>
            <button class="tab" data-source="patreon">Patreon</button>
        </section>

        <section class="controls">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search audios..." class="search-input">
            </div>
            <div class="sort-wrapper">
                <select id="sortSelect" class="sort-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="title">Title A–Z</option>
                </select>
            </div>
        </section>

        <section class="audio-grid" id="audioGrid">
            <!-- Cards injected by JS -->
        </section>

        <div class="empty-state" id="emptyState" style="display:none;">
            <p>No audios found ✦</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="constellation-divider">
            <span>✦</span><span>·</span><span>✦</span><span>·</span><span>✦</span>
        </div>
        <p>Made with 🖤 for <strong>GothicMynx</strong></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>

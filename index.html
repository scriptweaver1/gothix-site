<!DOCTYPE html>
<html lang="en" data-persona="both">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GothicMynx · Audio Masterlist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Quicksand:wght@400;500;600;700&family=Unbounded:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="giant-star">
        <div class="star-core"></div>
        <div class="star-corona"></div>
    </div>
    <div class="nebula-glow"></div>

    <header class="site-header">
        <div class="header-content">
            <h1 class="site-title">
                <span class="title-gothic">Gothic</span><span class="title-mynx">Mynx</span>
            </h1>
            <p class="site-subtitle">Audio Masterlist</p>
        </div>

        <div class="persona-switch" id="personaSwitch">
            <button class="switch-option" data-persona="gothix">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10 10-4.5 10-10S17.5 2 12 2z"/>
                    <path d="M12 2a7 7 0 0 0 0 20"/>
                </svg>
                <span>Gothix</span>
            </button>
            <button class="switch-option active" data-persona="both">
                <span>✦</span>
            </button>
            <button class="switch-option" data-persona="minxy">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>
                </svg>
                <span>Minxy</span>
            </button>
            <div class="switch-indicator"></div>
        </div>
    </header>

    <main class="main-content">
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>

        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-heading">Categories</h3>
                <div class="category-list" id="categoryList">
                    <button class="category-btn active" data-category="all">All</button>
                    <button class="category-btn" data-category="comfort">Comfort</button>
                    <button class="category-btn" data-category="yandere">Yandere</button>
                    <button class="category-btn" data-category="asmr">ASMR</button>
                    <button class="category-btn" data-category="romance">Romance</button>
                    <button class="category-btn" data-category="sleep-aid">Sleep Aid</button>
                    <button class="category-btn" data-category="sci-fi">Sci-Fi</button>
                </div>
            </div>

            <div class="sidebar-section">
                <h3 class="sidebar-heading">Source</h3>
                <div class="category-list" id="sourceList">
                    <button class="category-btn active" data-source="all">All</button>
                    <button class="category-btn" data-source="reddit">Reddit</button>
                    <button class="category-btn" data-source="patreon">Patreon</button>
                </div>
            </div>

            <div class="sidebar-divider"></div>

            <div class="sidebar-section">
                <h3 class="sidebar-heading">Display</h3>

                <label class="sidebar-label">Text Size</label>
                <div class="slider-row">
                    <span class="slider-label-sm">A</span>
                    <input type="range" id="textSizeSlider" class="styled-range" min="0" max="2" step="1" value="1">
                    <span class="slider-label-lg">A</span>
                </div>

                <label class="sidebar-label">Cards Per Page</label>
                <div class="cards-per-page" id="cardsPerPage">
                    <button class="cpp-btn" data-count="6">6</button>
                    <button class="cpp-btn active" data-count="12">12</button>
                    <button class="cpp-btn" data-count="24">24</button>
                    <button class="cpp-btn" data-count="all">All</button>
                </div>
            </div>
        </aside>

        <div class="content-area">
            <section class="controls">
                <div class="search-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search audios..." class="search-input">
                </div>
                <div class="sort-wrapper">
                    <select id="sortSelect" class="sort-select">
                        <option value="newest">Newest First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="title">Title A–Z</option>
                    </select>
                </div>
            </section>

            <section class="audio-grid" id="audioGrid">
                <!-- Cards injected by JS -->
            </section>

            <div class="pagination" id="pagination"></div>

            <div class="empty-state" id="emptyState" style="display:none;">
                <p>No audios found ✦</p>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="constellation-divider">
            <span>✦</span><span>·</span><span>✦</span><span>·</span><span>✦</span>
        </div>
        <p>Made with 🖤 for <strong>GothicMynx</strong></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
